name: Debug 247 Visits

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'dom = dump selectors for a few known pages; slugcheck = test every team URL for one season'
        type: choice
        options:
          - dom
          - slugcheck
        default: dom
        required: true
      season:
        description: 'Season (used by slugcheck; dom uses its built-in samples)'
        required: false
        default: '2025'

jobs:
  debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps + Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run debug (${{ inputs.mode }})
        run: |
          python debug_visits.py --mode ${{ inputs.mode }} --season ${{ inputs.season }}

      - name: Upload debug artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ inputs.mode }}-${{ inputs.season }}
          path: debug_out/
          retention-days: 14
          if-no-files-found: warn
